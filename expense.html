<!DOCTYPE html>
<html>
<head>
    <title>GrazeNex Expense</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>GrazeNex</h1>
        <p>Livestock Expense Management</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
            <a href="reports.html">Tasks</a>
            <a href="cattle.html">Cattle</a>
            <a href="income.html">Income</a>
            <a href="#" id="logoutBtn">Logout</a>
    </nav>

    <section class="register-section">

        <br><br>

        <h1>Expenditure Management</h1>

        <input type="text"
        id="expenseItem"
        placeholder="Expense Item">

        <input type="number"
        id="expenseAmount"
        placeholder="Amount">

        <input type="date"
        id="expenseDate">

        <button id="addExpenseBtn">
            Add Expense
        </button>

        <table border="1">

            <thead>
                <tr>
                    <th>Item</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="expenseList">

            </tbody>

        </table>

    </section>

    <script src="script.js"></script>

</body>
</html>
